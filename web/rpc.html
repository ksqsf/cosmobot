<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>cosmobot RPC</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f6f7f8;
      --panel: #ffffff;
      --panel-alt: #f0f3f5;
      --text: #17202a;
      --muted: #657282;
      --border: #d8dee5;
      --border-strong: #b9c2cc;
      --accent: #1b6fb8;
      --accent-strong: #15598f;
      --danger: #9a3412;
      --ok: #1f7a4d;
      --shadow: 0 1px 2px rgba(20, 32, 44, 0.08);
      font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      font-size: 14px;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      background: var(--bg);
      color: var(--text);
    }

    button,
    input,
    textarea,
    select {
      font: inherit;
    }

    button {
      min-height: 34px;
      border: 1px solid var(--border-strong);
      border-radius: 6px;
      padding: 0 12px;
      background: var(--panel);
      color: var(--text);
      cursor: pointer;
    }

    button:hover:not(:disabled) {
      border-color: var(--accent);
    }

    button.primary {
      border-color: var(--accent);
      background: var(--accent);
      color: #fff;
    }

    button.primary:hover:not(:disabled) {
      background: var(--accent-strong);
    }

    button:disabled {
      cursor: not-allowed;
      opacity: 0.58;
    }

    input,
    textarea,
    select {
      width: 100%;
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 8px 10px;
      background: #fff;
      color: var(--text);
    }

    textarea {
      min-height: 112px;
      resize: vertical;
      line-height: 1.45;
    }

    label {
      display: grid;
      gap: 5px;
      color: var(--muted);
      font-size: 12px;
      font-weight: 600;
      letter-spacing: 0;
    }

    .shell {
      display: grid;
      grid-template-rows: auto 1fr;
      min-height: 100vh;
    }

    .topbar {
      display: grid;
      grid-template-columns: minmax(180px, 1fr) minmax(120px, 220px) auto auto;
      gap: 10px;
      align-items: end;
      padding: 12px 16px;
      border-bottom: 1px solid var(--border);
      background: var(--panel);
      box-shadow: var(--shadow);
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 10px;
      min-height: 34px;
      font-weight: 700;
    }

    .status {
      display: inline-flex;
      align-items: center;
      gap: 7px;
      min-width: 128px;
      color: var(--muted);
      font-size: 13px;
      white-space: nowrap;
    }

    .dot {
      width: 9px;
      height: 9px;
      border-radius: 999px;
      background: var(--border-strong);
    }

    .dot.connected {
      background: var(--ok);
    }

    .dot.error {
      background: var(--danger);
    }

    .workspace {
      display: grid;
      grid-template-columns: minmax(420px, 1.45fr) minmax(320px, 0.9fr);
      gap: 14px;
      padding: 14px 16px 16px;
      min-height: 0;
    }

    .pane {
      display: grid;
      grid-template-rows: auto auto 1fr auto;
      min-height: calc(100vh - 92px);
      border: 1px solid var(--border);
      border-radius: 8px;
      background: var(--panel);
      box-shadow: var(--shadow);
      overflow: hidden;
    }

    .pane.audit {
      grid-template-rows: auto auto 1fr;
    }

    .pane-header,
    .pane-tools,
    .composer {
      border-bottom: 1px solid var(--border);
      padding: 10px 12px;
      background: var(--panel);
    }

    .pane-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
    }

    .pane-title {
      margin: 0;
      font-size: 15px;
      font-weight: 700;
    }

    .pane-note {
      color: var(--muted);
      font-size: 12px;
      white-space: nowrap;
    }

    .pane-tools {
      display: grid;
      grid-template-columns: minmax(150px, 1fr) auto;
      gap: 8px;
      align-items: end;
      background: var(--panel-alt);
    }

    .chat-tools {
      display: grid;
      grid-template-columns: minmax(120px, 180px) minmax(160px, 1fr) auto;
      gap: 8px;
      align-items: end;
    }

    .chat-log,
    .audit-detail,
    .audit-list {
      min-height: 0;
      overflow: auto;
    }

    .chat-log {
      padding: 12px;
      background: #fbfcfd;
    }

    .message {
      max-width: 82%;
      margin: 0 0 10px;
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 8px 10px;
      background: var(--panel);
      overflow-wrap: anywhere;
    }

    .message.user {
      margin-left: auto;
      border-color: #bfd4e8;
      background: #edf5fc;
    }

    .message.bot {
      margin-right: auto;
    }

    .message.pending {
      border-style: dashed;
      color: var(--muted);
    }

    .message-meta {
      display: flex;
      justify-content: space-between;
      gap: 10px;
      margin-bottom: 5px;
      color: var(--muted);
      font-size: 12px;
      font-weight: 600;
    }

    .message-text {
      white-space: pre-wrap;
      line-height: 1.45;
    }

    .composer {
      display: grid;
      gap: 8px;
      border-top: 1px solid var(--border);
      border-bottom: 0;
      background: var(--panel);
    }

    .composer-actions {
      display: flex;
      justify-content: space-between;
      gap: 8px;
      align-items: center;
    }

    .audit-grid {
      display: grid;
      grid-template-columns: minmax(170px, 0.85fr) minmax(220px, 1fr);
      min-height: 0;
    }

    .audit-list {
      border-right: 1px solid var(--border);
      background: #fbfcfd;
    }

    .audit-row {
      width: 100%;
      min-height: 48px;
      display: grid;
      gap: 3px;
      padding: 8px 10px;
      border: 0;
      border-bottom: 1px solid var(--border);
      border-radius: 0;
      text-align: left;
      background: transparent;
    }

    .audit-row:hover {
      background: var(--panel-alt);
    }

    .audit-row.active {
      background: #e8f1f9;
    }

    .audit-row strong,
    .audit-row span {
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .audit-row span {
      color: var(--muted);
      font-size: 12px;
    }

    .audit-detail {
      padding: 10px 12px;
      background: #fbfcfd;
    }

    pre {
      margin: 0;
      white-space: pre-wrap;
      overflow-wrap: anywhere;
      font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, "Liberation Mono", monospace;
      font-size: 12px;
      line-height: 1.45;
    }

    .log {
      max-height: 92px;
      overflow: auto;
      border-top: 1px solid var(--border);
      padding: 6px 12px;
      background: #202932;
      color: #d7e0ea;
      font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, "Liberation Mono", monospace;
      font-size: 12px;
      line-height: 1.45;
    }

    .muted {
      color: var(--muted);
    }

    @media (max-width: 960px) {
      .topbar {
        grid-template-columns: 1fr;
      }

      .workspace {
        grid-template-columns: 1fr;
      }

      .pane {
        min-height: 640px;
      }

      .chat-tools,
      .audit-grid {
        grid-template-columns: 1fr;
      }

      .audit-list {
        max-height: 260px;
        border-right: 0;
        border-bottom: 1px solid var(--border);
      }
    }
  </style>
</head>
<body>
  <main class="shell">
    <header class="topbar">
      <div class="brand">
        <span>cosmobot RPC</span>
        <span class="status"><span id="statusDot" class="dot"></span><span id="statusText">Disconnected</span></span>
      </div>
      <label>
        WebSocket URL
        <input id="urlInput" autocomplete="off" spellcheck="false" value="ws://127.0.0.1:38765/">
      </label>
      <label>
        Access token
        <input id="tokenInput" autocomplete="off" spellcheck="false" type="password" placeholder="rpc.token">
      </label>
      <button id="connectButton" class="primary" type="button">Connect</button>
    </header>

    <section class="workspace">
      <section class="pane">
        <div class="pane-header">
          <h1 class="pane-title">Chat</h1>
          <span id="sessionLabel" class="pane-note">No session</span>
        </div>
        <div class="pane-tools chat-tools">
          <label>
            Label
            <input id="labelInput" value="browser" autocomplete="off">
          </label>
          <label>
            Session ID
            <input id="sessionInput" autocomplete="off" placeholder="Create or enter an existing session">
          </label>
          <button id="newSessionButton" type="button">New Session</button>
        </div>
        <div id="chatLog" class="chat-log" aria-live="polite"></div>
        <form id="composer" class="composer">
          <label>
            Prompt
            <textarea id="promptInput" placeholder="Type a message for the RPC chat session"></textarea>
          </label>
          <div class="composer-actions">
            <span class="muted" id="chatHint">Create a session, then submit a prompt.</span>
            <button id="sendButton" class="primary" type="submit">Send</button>
          </div>
        </form>
      </section>

      <section class="pane audit">
        <div class="pane-header">
          <h2 class="pane-title">Audit</h2>
          <span id="auditMode" class="pane-note">Not subscribed</span>
        </div>
        <div class="pane-tools">
          <label>
            Recent limit
            <input id="auditLimitInput" type="number" min="1" max="200" value="40">
          </label>
          <div>
            <button id="auditRecentButton" type="button">Load Recent</button>
            <button id="auditSubscribeButton" type="button">Subscribe</button>
          </div>
        </div>
        <div class="audit-grid">
          <div id="auditList" class="audit-list"></div>
          <div class="audit-detail">
            <pre id="auditDetail">Select an audit event.</pre>
          </div>
        </div>
      </section>
    </section>
    <div id="eventLog" class="log"></div>
  </main>

  <script>
    (() => {
      "use strict";

      const storagePrefix = "cosmobot.rpc.";
      const state = {
        ws: null,
        nextId: 1,
        pending: new Map(),
        connected: false,
        sessionId: "",
        messages: new Map(),
        auditEvents: [],
        selectedAuditId: null
      };

      const el = {
        statusDot: document.getElementById("statusDot"),
        statusText: document.getElementById("statusText"),
        urlInput: document.getElementById("urlInput"),
        tokenInput: document.getElementById("tokenInput"),
        connectButton: document.getElementById("connectButton"),
        labelInput: document.getElementById("labelInput"),
        sessionInput: document.getElementById("sessionInput"),
        sessionLabel: document.getElementById("sessionLabel"),
        newSessionButton: document.getElementById("newSessionButton"),
        chatLog: document.getElementById("chatLog"),
        composer: document.getElementById("composer"),
        promptInput: document.getElementById("promptInput"),
        sendButton: document.getElementById("sendButton"),
        chatHint: document.getElementById("chatHint"),
        auditLimitInput: document.getElementById("auditLimitInput"),
        auditRecentButton: document.getElementById("auditRecentButton"),
        auditSubscribeButton: document.getElementById("auditSubscribeButton"),
        auditMode: document.getElementById("auditMode"),
        auditList: document.getElementById("auditList"),
        auditDetail: document.getElementById("auditDetail"),
        eventLog: document.getElementById("eventLog")
      };

      function init() {
        el.urlInput.value = localStorage.getItem(storagePrefix + "url") || el.urlInput.value;
        el.tokenInput.value = localStorage.getItem(storagePrefix + "token") || "";
        el.sessionInput.value = localStorage.getItem(storagePrefix + "sessionId") || "";
        state.sessionId = el.sessionInput.value.trim();
        updateConnectionUi();
        updateSessionUi();
        renderChat();
        renderAuditList();

        el.connectButton.addEventListener("click", toggleConnection);
        el.newSessionButton.addEventListener("click", createSession);
        el.composer.addEventListener("submit", submitPrompt);
        el.sessionInput.addEventListener("input", () => {
          setSession(el.sessionInput.value.trim());
        });
        el.auditRecentButton.addEventListener("click", loadRecentAudit);
        el.auditSubscribeButton.addEventListener("click", subscribeAudit);
      }

      function buildUrl() {
        const raw = el.urlInput.value.trim() || "ws://127.0.0.1:38765/";
        const token = el.tokenInput.value;
        const url = new URL(raw);
        if (token) {
          url.searchParams.set("access_token", token);
        }
        return url.toString();
      }

      function toggleConnection() {
        if (state.ws) {
          state.ws.close();
          return;
        }
        connect();
      }

      function connect() {
        let url;
        try {
          url = buildUrl();
        } catch (err) {
          setStatus("Invalid URL", "error");
          logEvent("Invalid WebSocket URL: " + err.message);
          return;
        }

        localStorage.setItem(storagePrefix + "url", el.urlInput.value.trim());
        localStorage.setItem(storagePrefix + "token", el.tokenInput.value);
        setStatus("Connecting", "");
        const ws = new WebSocket(url);
        state.ws = ws;

        ws.addEventListener("open", () => {
          state.connected = true;
          setStatus("Connected", "connected");
          logEvent("Connected");
        });

        ws.addEventListener("message", (event) => {
          handleIncoming(event.data);
        });

        ws.addEventListener("error", () => {
          setStatus("Connection error", "error");
        });

        ws.addEventListener("close", () => {
          for (const pending of state.pending.values()) {
            pending.reject(new Error("WebSocket closed"));
          }
          state.pending.clear();
          state.connected = false;
          state.ws = null;
          setStatus("Disconnected", "");
          logEvent("Disconnected");
        });
      }

      function setStatus(text, tone) {
        el.statusText.textContent = text;
        el.statusDot.className = "dot" + (tone ? " " + tone : "");
        el.connectButton.textContent = state.ws ? "Disconnect" : "Connect";
        updateConnectionUi();
      }

      function updateConnectionUi() {
        const enabled = Boolean(state.connected);
        el.newSessionButton.disabled = !enabled;
        el.sendButton.disabled = !enabled || !state.sessionId;
        el.auditRecentButton.disabled = !enabled;
        el.auditSubscribeButton.disabled = !enabled;
      }

      function request(method, params) {
        if (!state.ws || state.ws.readyState !== WebSocket.OPEN) {
          return Promise.reject(new Error("WebSocket is not connected"));
        }

        const id = String(state.nextId++);
        const payload = { jsonrpc: "2.0", id, method, params: params || {} };
        state.ws.send(JSON.stringify(payload));
        logEvent("-> " + method + " #" + id);

        return new Promise((resolve, reject) => {
          const timeout = setTimeout(() => {
            state.pending.delete(id);
            reject(new Error("Request timed out: " + method));
          }, 30000);
          state.pending.set(id, { resolve, reject, timeout, method });
        });
      }

      async function requestFirst(methods, params) {
        let lastError = null;
        for (const method of methods) {
          try {
            return await request(method, params);
          } catch (err) {
            lastError = err;
            if (!/method_not_found|Unknown RPC method/i.test(err.message)) {
              throw err;
            }
          }
        }
        throw lastError || new Error("No RPC method was available");
      }

      function handleIncoming(raw) {
        let message;
        try {
          message = JSON.parse(raw);
        } catch (err) {
          logEvent("Invalid JSON from server: " + err.message);
          return;
        }

        if (message && Object.prototype.hasOwnProperty.call(message, "id")) {
          handleResponse(message);
          return;
        }

        if (message && typeof message.method === "string") {
          handleNotification(message.method, message.params);
          return;
        }

        logEvent("<- unrecognized message");
      }

      function handleResponse(response) {
        const pending = state.pending.get(String(response.id));
        if (!pending) {
          logEvent("<- response #" + response.id + " without pending request");
          return;
        }

        clearTimeout(pending.timeout);
        state.pending.delete(String(response.id));
        if (!response.error) {
          logEvent("<- " + pending.method + " ok");
          pending.resolve(response.result);
        } else {
          const error = response.error || {};
          const detail = [error.code, error.message].filter(Boolean).join(": ") || "request failed";
          logEvent("<- " + pending.method + " failed: " + detail);
          pending.reject(new Error(detail));
        }
      }

      function handleNotification(method, params) {
        logEvent("<- " + method);
        if (method === "chat.message") {
          upsertChatMessage(params, false);
        } else if (method === "chat.message_update") {
          upsertChatMessage(params, true);
        } else if (method === "audit.event") {
          addAuditEvent(params, true);
        }
      }

      async function createSession() {
        try {
          const label = el.labelInput.value.trim();
          const result = await requestFirst(["chat.open_session", "chat.open"], label ? { label } : {});
          const sessionId = extractSessionId(result);
          if (!sessionId) {
            throw new Error("chat.open_session returned no session id");
          }
          setSession(sessionId);
          state.messages.clear();
          renderChat();
        } catch (err) {
          logEvent("Create session failed: " + err.message);
        }
      }

      async function submitPrompt(event) {
        event.preventDefault();
        const text = el.promptInput.value.trim();
        if (!text) {
          return;
        }
        const sessionId = el.sessionInput.value.trim();
        if (!sessionId) {
          logEvent("No session id");
          return;
        }

        setSession(sessionId);
        el.promptInput.value = "";
        try {
          await request("chat.send", { sessionId, text, imageUrls: [] });
        } catch (err) {
          logEvent("Send failed: " + err.message);
          upsertChatMessage({
            sessionId,
            messageId: "local-error-" + Date.now(),
            sender: "system",
            text: "Send failed: " + err.message,
            imageUrls: []
          }, false);
        }
      }

      function setSession(sessionId) {
        state.sessionId = sessionId;
        el.sessionInput.value = sessionId;
        localStorage.setItem(storagePrefix + "sessionId", sessionId);
        updateSessionUi();
      }

      function updateSessionUi() {
        el.sessionLabel.textContent = state.sessionId ? state.sessionId : "No session";
        el.chatHint.textContent = state.sessionId
          ? "Notifications update this transcript as the bot replies."
          : "Create a session, then submit a prompt.";
        updateConnectionUi();
      }

      function extractSessionId(result) {
        if (typeof result === "string") {
          return result;
        }
        if (result && typeof result === "object") {
          return result.sessionId || result.id || result.unRpcSessionId || "";
        }
        return "";
      }

      function normalizeMessage(payload, isUpdate) {
        const messageId = String(payload && (payload.messageId || payload.id) || "message-" + Date.now());
        const sender = String(payload && payload.sender || (isUpdate ? "bot" : "bot"));
        return {
          sessionId: String(payload && payload.sessionId || state.sessionId || ""),
          messageId,
          sender,
          text: String(payload && payload.text || ""),
          imageUrls: Array.isArray(payload && payload.imageUrls) ? payload.imageUrls : [],
          replyToMessageId: payload && payload.replyToMessageId || null,
          updated: isUpdate
        };
      }

      function upsertChatMessage(payload, isUpdate) {
        const msg = normalizeMessage(payload || {}, isUpdate);
        if (msg.sessionId && state.sessionId && msg.sessionId !== state.sessionId) {
          return;
        }
        if (msg.sessionId && !state.sessionId) {
          setSession(msg.sessionId);
        }

        const existing = state.messages.get(msg.messageId);
        state.messages.set(msg.messageId, existing ? { ...existing, ...msg } : msg);
        renderChat();
      }

      function renderChat() {
        el.chatLog.replaceChildren();
        const messages = Array.from(state.messages.values());
        if (messages.length === 0) {
          const empty = document.createElement("div");
          empty.className = "message pending";
          empty.textContent = "No chat messages yet.";
          el.chatLog.appendChild(empty);
          return;
        }

        for (const msg of messages) {
          const node = document.createElement("article");
          const role = msg.sender === "user" ? "user" : "bot";
          node.className = "message " + role;

          const meta = document.createElement("div");
          meta.className = "message-meta";
          const who = document.createElement("span");
          who.textContent = msg.sender || "bot";
          const id = document.createElement("span");
          id.textContent = msg.messageId;
          meta.append(who, id);

          const text = document.createElement("div");
          text.className = "message-text";
          text.textContent = msg.text || "";

          node.append(meta, text);
          el.chatLog.appendChild(node);
        }
        el.chatLog.scrollTop = el.chatLog.scrollHeight;
      }

      async function loadRecentAudit() {
        try {
          const limit = Math.max(1, Number(el.auditLimitInput.value) || 40);
          const result = await request("audit.recent", { limit });
          state.auditEvents = extractAuditRows(result);
          state.selectedAuditId = null;
          renderAuditList();
          el.auditDetail.textContent = "Select an audit event.";
        } catch (err) {
          logEvent("Load recent audit failed: " + err.message);
        }
      }

      async function subscribeAudit() {
        try {
          await request("audit.subscribe", {});
          el.auditMode.textContent = "Subscribed";
        } catch (err) {
          logEvent("Audit subscribe failed: " + err.message);
        }
      }

      function extractAuditRows(result) {
        if (Array.isArray(result)) {
          return result;
        }
        if (result && Array.isArray(result.records)) {
          return result.records;
        }
        if (result && Array.isArray(result.events)) {
          return result.events;
        }
        return [];
      }

      function addAuditEvent(event, fromLive) {
        const id = auditId(event);
        if (id !== null) {
          state.auditEvents = state.auditEvents.filter((row) => auditId(row) !== id);
        }
        state.auditEvents.unshift(event);
        state.auditEvents = state.auditEvents.slice(0, 200);
        if (fromLive) {
          el.auditMode.textContent = "Live";
        }
        renderAuditList();
      }

      function auditId(row) {
        if (!row || typeof row !== "object") {
          return null;
        }
        return row.auditId ?? row.id ?? row.recordId ?? null;
      }

      function auditTitle(row) {
        if (!row || typeof row !== "object") {
          return "Audit event";
        }
        const id = auditId(row);
        const event = row.event && typeof row.event === "object" ? row.event : row;
        const tool = event.toolName || event.tool || event.name || row.toolName || row.tool || "";
        const type = event.tag || event.type || row.type || row.kind || "audit";
        return [id === null ? null : "#" + id, type, tool].filter(Boolean).join(" ");
      }

      function auditSubtitle(row) {
        if (!row || typeof row !== "object") {
          return "";
        }
        return row.occurredAt || row.createdAt || row.timestamp || row.status || "";
      }

      function renderAuditList() {
        el.auditList.replaceChildren();
        if (state.auditEvents.length === 0) {
          const empty = document.createElement("div");
          empty.className = "audit-row";
          empty.textContent = "No audit events.";
          el.auditList.appendChild(empty);
          return;
        }

        for (const row of state.auditEvents) {
          const id = auditId(row);
          const button = document.createElement("button");
          button.className = "audit-row" + (id !== null && id === state.selectedAuditId ? " active" : "");
          button.type = "button";

          const title = document.createElement("strong");
          title.textContent = auditTitle(row);
          const sub = document.createElement("span");
          sub.textContent = auditSubtitle(row);
          button.append(title, sub);
          button.addEventListener("click", () => selectAudit(row));
          el.auditList.appendChild(button);
        }
      }

      async function selectAudit(row) {
        const id = auditId(row);
        state.selectedAuditId = id;
        renderAuditList();
        el.auditDetail.textContent = pretty(row);

        if (id === null) {
          return;
        }

        try {
          const detail = await requestFirst(["audit.get", "audit.show"], { id, auditId: id });
          el.auditDetail.textContent = pretty(detail);
        } catch (err) {
          el.auditDetail.textContent = pretty(row) + "\n\nDetail lookup failed: " + err.message;
        }
      }

      function pretty(value) {
        return JSON.stringify(value, null, 2);
      }

      function logEvent(line) {
        const stamp = new Date().toLocaleTimeString();
        const div = document.createElement("div");
        div.textContent = stamp + " " + line;
        el.eventLog.appendChild(div);
        el.eventLog.scrollTop = el.eventLog.scrollHeight;
      }

      init();
    })();
  </script>
</body>
</html>

[log]
level = "info"

[storage]
sqlite_path = "cosmobot.sqlite3"

[rpc]
enabled = false
host = "127.0.0.1"
port = 38765
token = ""
attachment_dir = "attachments"
attachment_max_bytes = 26214400

[driver.qq]
host = "127.0.0.1"
port = 3001
path = "/"
token = "xxx"
bot_id = 0
superusers = []
allowed_groups = []
allowed_users = []

[driver.telegram]
bot_token = ""
bot_id = ""
superusers = []
allowed_chats = []

[driver.matrix]
homeserver = "https://matrix.org"
login_user = ""
login_password = ""
device_id = "cosmobot"
direct_rooms = []
bot_id = "@bot:matrix.org"
superusers = []
allowed_rooms = []

[driver.discord]
bot_token = ""
bot_id = ""
application_id = ""
allowed_guilds = []
allowed_channels = []
allowed_users = []
superusers = []
gateway_host = "gateway.discord.gg"
gateway_path = "/?v=10&encoding=json"

[llm]
chat = "openrouter"
image = "openai"
audio = "openai"

[llm.chat_provider.openrouter]
base_url = "https://openrouter.ai/api/v1"
api_key = ""
model = "openai/gpt-4o-mini"
reasoning_effort = "low"
timeout = 60

[llm.image_provider.openai]
base_url = "https://api.openai.com/v1"
api_key = ""
model = "gpt-image-1.5"
can_generate = true
can_edit = false
timeout = 300
quality = "medium"
size = "1024x1024"
aspect_ratio = "1:1"
background = "auto"
moderation = "auto"
output_format = "webp"
output_compression = 80

[llm.audio_provider.openai]
base_url = "https://api.openai.com/v1"
api_key = ""
model = "gpt-4o-mini-tts"
voice = "coral"
response_format = "mp3"
timeout = 300
# speed = 1.0
# instructions = "Speak clearly."

[media]
cache_dir = "media-cache"
public_base_url = "https://media.example.com/cosmobot-media"

[media.gc]
enabled = false
older_than_days = 7
interval_hours = 24

[media.s3]
enabled = false
bucket = "cosmobot-media"
region = "us-east-1"
# endpoint = "https://s3.example.com"
# For Cloudflare R2, use:
# region = "auto"
# endpoint = "https://<account-id>.r2.cloudflarestorage.com"
# addressing_style = "path"
access_key_id = ""
secret_access_key = ""
prefix = "cosmobot/media"
public_read_acl = false
addressing_style = "auto"

[memory]
dir = "memory"

[skills]
dir = "skills"

[tool]
datetime = false

[tool.web_fetch]
enable = false
max_uses = 5
max_content_tokens = 50000

[tool.web_search]
enable = false
api = "tavily"
max_results = 5
tavily_api_key = ""
brave_api_key = ""

[handler.saucenao]
api_key = ""

[handler.admin.upgrade]
script = "./update.sh"

[handler.shutup]
delete_patterns = []

[handler.ask]
command = "!ask"
draw_command = "!draw"
agent_max_turns = 4

[log]
level = "info"

[storage]
sqlite_path = "cosmobot.sqlite3"

[qq]
host = "127.0.0.1"
port = 3001
path = "/"
token = "xxx"
bot_qq = 0
superusers = []

[telegram]
bot_token = ""
bot_id = ""
superusers = []

[llm]
endpoint = "https://openrouter.ai/api/v1"
api_key = ""
model = "openai/gpt-4o-mini"
reasoning_effort = "low"
image_generation = false
image_generation_endpoint = ""
image_generation_api_key = ""
image_generation_model = "openai/gpt-5-image-mini"
image_generation_quality = "medium"
image_generation_size = "1024x1024"
image_generation_output_format = "webp"
image_generation_output_compression = 80

[tool]
datetime = false

[tool.web_fetch]
enable = false
max_uses = 5
max_content_tokens = 50000

[tool.web_search]
enable = false
api = "tavily"
max_results = 5
tavily_api_key = ""
brave_api_key = ""

[saucenao]
api_key = ""

[memory]
dir = "memory"

[handlers.ask]
command = "!ask"
draw_command = "!draw"
agent_max_turns = 4
qq_group_whitelist = []
telegram_chat_whitelist = []

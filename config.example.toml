[log]
level = "info"

[storage]
sqlite_path = "cosmobot.sqlite3"

[driver.qq]
host = "127.0.0.1"
port = 3001
path = "/"
token = "xxx"
bot_id = 0
superusers = []
allowed_groups = []
allowed_users = []

[driver.telegram]
bot_token = ""
bot_id = ""
superusers = []
allowed_chats = []

[driver.matrix]
homeserver = "https://matrix.org"
access_token = ""
bot_id = "@bot:matrix.org"
superusers = []
allowed_rooms = []

[llm]
chat = "openrouter"
image = "openai"

[llm.chat_provider.openrouter]
base_url = "https://openrouter.ai/api/v1"
api_key = ""
model = "openai/gpt-4o-mini"
reasoning_effort = "low"
timeout = 60

[llm.image_provider.openai]
base_url = "https://api.openai.com/v1"
api_key = ""
model = "gpt-image-1.5"
can_generate = true
can_edit = false
timeout = 300
quality = "medium"
size = "1024x1024"
aspect_ratio = "1:1"
background = "auto"
moderation = "auto"
output_format = "webp"
output_compression = 80

[memory]
dir = "memory"

[skills]
dir = "skills"

[tool]
datetime = false

[tool.web_fetch]
enable = false
max_uses = 5
max_content_tokens = 50000

[tool.web_search]
enable = false
api = "tavily"
max_results = 5
tavily_api_key = ""
brave_api_key = ""

[handler.saucenao]
api_key = ""

[handler.admin.upgrade]
script = "./update.sh"

[handler.shutup]
delete_patterns = []

[handler.ask]
command = "!ask"
draw_command = "!draw"
agent_max_turns = 4

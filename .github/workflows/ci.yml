name: CI

on:
  push:
  pull_request:

jobs:
  cabal:
    name: Cabal
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Haskell
        uses: haskell-actions/setup@v2
        with:
          ghc-version: "9.10.3"
          cabal-version: "3.14.2.0"

      - name: Cache Cabal
        uses: actions/cache@v4
        with:
          path: |
            ~/.cabal/store
            dist-newstyle
          key: ${{ runner.os }}-ghc-9.10.3-cabal-${{ hashFiles('cosmobot.cabal') }}
          restore-keys: |
            ${{ runner.os }}-ghc-9.10.3-cabal-

      - name: Update package index
        run: cabal update

      - name: Build
        run: cabal build all --enable-tests --enable-benchmarks

      - name: Test
        run: cabal test all
